<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="describtion" content="personal course organizer">
    <link rel="icon" href="image/miniLogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond
    :ital,wght@0,300..700;1,300..700&family=Noto+Serif:ital,wght@0,100..900;1,100..900&
    display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/add-course.css">
    <title>StudyBloom | Add Course</title> 
</head>
<body>
    <header>
        <nav class="head">
            <img  class="logo" src="image/logo.png" alt="logo">
            <img  class="minilogo" src="image/miniLogo.png" alt="logo">
            <ul class="links">
                <li class="item"><a class="section" href="../home.html">Home</a></li>
                <li class="item"><a class="section" href="../my-courses/my-courses.html">My Courses</a></li>
                <li class="item"><a class="section add" href="add-course.html">Add Course</a></li>
                <li class="item"><a class="section" href="../contact-us/contact-us.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main class="newCourse1">
            <h2 class="title1">* Add New Course *</h2>
            <p class="description1">Fill in the details below to add a new course to your planner.</p>
    </main>
    <section class="add2">
        <div class="formDate">
       <div class="form">    
      <form method="post">
        <div class="dataUser">
         <label  for="name">Course Name</label>
         <input class="inputData" type="text" name="Course Name" id="name" placeholder="Enter course name" required>
        </div>
        <div class="dataUser">
         <label for="email">Instructor</label>
         <input class="inputData" type="email" name="Email" id="email" placeholder="Enter instructor name" required>
        </div>
        <div class="dataUser">
         <label for="hour">Credit Hours</label>
         <input class="inputData" type="number"  min="0" max="50" placeholder="e.g. 3" required></input>
        </div>
        <div class="dataUser">
         <label for="message">Notes</label>
         <textarea class="message" placeholder="Notes about course..." required></textarea>
        </div>
        <button class="send" type="submit">Add Course</button>
       </form>
        </div>
            <img class="photo" src="image/Pastel productivity and notifications overview.png" >

       </div>
    </section>

    <footer>
        <div class="line"></div>
        <div class="end">
          <p>© 2026 StudyBloom | Made with love by Rahma Mohamed </p>

            <a target="_blank" href="https://www.whatsapp.com/"><img class="ficon" src="image/icon=watsapp, color=yes, round=yes.png"></a>
          </div>

    </footer>
